<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --x-color: #e63946;
    --o-color: #1d7fe8;
    --bg: #0f0e17;
    --surface: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
    --gold: #ffd700;
    --text: #fffffe;
    --muted: rgba(255,255,255,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Animated BG ── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(230,57,70,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(29,127,232,0.15) 0%, transparent 55%),
      #0f0e17;
  }
  .star { position: fixed; border-radius: 50%; background: white; pointer-events: none; }

  /* ── Layout ── */
  .wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 16px 60px; }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 24px; animation: fadeDown 0.7s both; }
  .game-title {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2rem, 6vw, 3.6rem);
    line-height: 1;
    letter-spacing: 2px;
  }
  .title-zak { color: var(--x-color); text-shadow: 0 0 30px rgba(230,57,70,0.5); }
  .title-amp { color: var(--gold); margin: 0 8px; }
  .title-zayd { color: var(--o-color); text-shadow: 0 0 30px rgba(29,127,232,0.5); }
  .title-sub { font-size: 1rem; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px);} to { opacity:1; transform:translateY(0);} }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 900px; animation: fadeIn 0.4s both; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.97);} to { opacity:1; transform:scale(1);} }

  /* ── Setup Screen ── */
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    backdrop-filter: blur(12px);
  }
  .setup-card h2 { font-family:'Boogaloo',cursive; font-size:1.8rem; margin-bottom:20px; text-align:center; color: var(--gold); }

  .input-group { margin-bottom: 16px; }
  .input-group label { display:block; font-weight:800; font-size:0.85rem; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; }
  .input-group label.x-label { color: var(--x-color); }
  .input-group label.o-label { color: var(--o-color); }
  .input-group input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.08);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: rgba(255,255,255,0.4); }

  .grid-picker { margin-bottom: 20px; }
  .grid-picker label { display:block; font-weight:800; font-size:0.85rem; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; color: var(--gold); }
  .grid-options { display:flex; flex-wrap:wrap; gap:10px; }
  .grid-btn {
    padding: 10px 18px;
    background: rgba(255,255,255,0.07);
    border: 2px solid var(--border);
    border-radius: 50px;
    color: var(--muted);
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .grid-btn:hover { background: rgba(255,255,255,0.14); color: white; }
  .grid-btn.selected { background: var(--gold); border-color: var(--gold); color: #0f0e17; font-weight:900; }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--x-color), #c1121f);
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Boogaloo', cursive;
    font-size: 1.4rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 30px rgba(230,57,70,0.4);
  }
  .start-btn:hover { transform: scale(1.03); box-shadow: 0 8px 40px rgba(230,57,70,0.6); }
  .start-btn:active { transform: scale(0.97); }

  /* ── Game Screen ── */
  .game-layout { display:flex; gap:24px; width:100%; align-items:flex-start; flex-wrap:wrap; justify-content:center; }

  /* ── Score Panel ── */
  .score-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    min-width: 200px;
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .score-panel h3 {
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    color: var(--gold);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    transition: all 0.3s;
  }
  .score-row.x-row { background: rgba(230,57,70,0.12); border: 1px solid rgba(230,57,70,0.25); }
  .score-row.o-row { background: rgba(29,127,232,0.12); border: 1px solid rgba(29,127,232,0.25); }
  .score-row.x-row.active-turn { background: rgba(230,57,70,0.3); border-color: var(--x-color); transform:scale(1.03); }
  .score-row.o-row.active-turn { background: rgba(29,127,232,0.3); border-color: var(--o-color); transform:scale(1.03); }
  .score-name { font-weight: 800; font-size: 0.95rem; }
  .score-row.x-row .score-name { color: var(--x-color); }
  .score-row.o-row .score-name { color: var(--o-color); }
  .score-num { font-family: 'Boogaloo', cursive; font-size: 1.8rem; color: white; }
  .draw-row { text-align:center; margin-top:8px; color: var(--muted); font-size:0.85rem; font-weight:700; }
  .draw-num { font-family:'Boogaloo',cursive; font-size:1.2rem; color:white; }

  .music-toggle {
    width: 100%;
    margin-top: 14px;
    padding: 10px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 50px;
    color: var(--gold);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .music-toggle:hover { background: rgba(255,215,0,0.2); }

  /* ── Status Bar ── */
  .status-bar {
    font-family: 'Boogaloo', cursive;
    font-size: 1.3rem;
    letter-spacing: 1px;
    text-align: center;
    padding: 12px 28px;
    border-radius: 50px;
    background: var(--surface);
    border: 1px solid var(--border);
    min-width: 260px;
    transition: all 0.3s;
  }

  /* ── Board ── */
  .board-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .board {
    display: grid;
    gap: 8px;
    padding: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .cell {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Boogaloo', cursive;
    font-weight: 900;
    transition: background 0.18s, transform 0.12s, border-color 0.18s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .cell:hover:not(.taken) { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.28); transform: scale(1.05); }
  .cell:active:not(.taken) { transform: scale(0.93); }
  .cell.taken { cursor: default; }
  .cell .mark { display:inline-block; animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes popIn { from{transform:scale(0) rotate(-25deg);opacity:0;} to{transform:scale(1) rotate(0);opacity:1;} }
  .cell.x-cell { color: var(--x-color); }
  .cell.o-cell { color: var(--o-color); }
  .cell.winner-cell.x-cell { background:rgba(230,57,70,0.28); border-color:var(--x-color); animation: winBounce 0.5s ease forwards; }
  .cell.winner-cell.o-cell { background:rgba(29,127,232,0.28); border-color:var(--o-color); animation: winBounce 0.5s ease forwards; }
  @keyframes winBounce { 0%{transform:scale(1);} 40%{transform:scale(1.18);} 70%{transform:scale(0.95);} 100%{transform:scale(1.08);} }

  /* ── Board size controls ── */
  .board-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .action-btn {
    padding: 10px 22px;
    border-radius: 50px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  .action-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.3); transform:scale(1.04); }
  .action-btn.danger { border-color: rgba(230,57,70,0.4); color: var(--x-color); }
  .action-btn.danger:hover { background: rgba(230,57,70,0.12); }

  /* ── Modal / Overlay ── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s both;
  }
  .overlay.show { display: flex; }
  .modal {
    background: linear-gradient(160deg, #1a1a2e, #16213e);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 40px 48px;
    text-align: center;
    max-width: 480px;
    width: 90%;
    animation: modalPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  @keyframes modalPop { from{transform:scale(0.6) translateY(40px);opacity:0;} to{transform:scale(1) translateY(0);opacity:1;} }
  .modal .trophy { font-size: 4rem; margin-bottom: 10px; animation: trophySpin 0.8s ease 0.3s both; }
  @keyframes trophySpin { from{transform:rotate(-20deg) scale(0);} to{transform:rotate(0) scale(1);} }
  .modal h2 { font-family:'Boogaloo',cursive; font-size:2rem; margin-bottom:8px; }
  .modal .win-msg { color:var(--muted); font-size:0.95rem; margin-bottom:6px; }
  .modal .dev-credit {
    font-family:'Boogaloo',cursive;
    font-size:1rem;
    color: var(--gold);
    letter-spacing:1px;
    margin: 16px 0 24px;
    padding: 12px 20px;
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 12px;
    line-height: 1.5;
  }
  .modal-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .modal-btns button {
    padding: 12px 28px;
    border-radius: 50px;
    border: none;
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .modal-btns button:hover { transform:scale(1.06); }
  .modal-btns .btn-play { background:linear-gradient(135deg,var(--x-color),#c1121f); color:white; box-shadow:0 4px 20px rgba(230,57,70,0.4); }
  .modal-btns .btn-menu { background:rgba(255,255,255,0.1); color:white; border:1px solid var(--border); }

  /* ── Confetti ── */
  .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:99; overflow:hidden; }
  .cf { position:absolute; top:-20px; border-radius:2px; animation: cfFall var(--d) linear var(--delay) forwards; }
  @keyframes cfFall { to { transform:translateY(110vh) rotate(var(--rot)); opacity:0; } }

  /* ── Footer ── */
  footer { position:fixed; bottom:0; left:0; right:0; text-align:center; padding:8px; color:var(--muted); font-size:0.75rem; background:rgba(15,14,23,0.8); backdrop-filter:blur(8px); z-index:10; }

  /* ── Mobile Responsive ── */
  @media (max-width: 600px) {
    .game-layout { flex-direction: column; align-items: center; gap: 14px; }
    .score-panel { width: 100%; max-width: 400px; padding: 14px; }
    .score-panel h3 { font-size: 0.9rem; margin-bottom: 10px; }
    .score-row { padding: 8px 12px; }
    .score-num { font-size: 1.4rem; }
    .board { gap: 5px; padding: 10px; }
    .board-actions { gap: 8px; }
    .action-btn { padding: 8px 16px; font-size: 0.9rem; }
    .status-bar { font-size: 1rem; padding: 10px 18px; }
    .setup-card { padding: 22px 18px; }
    h1 { display: none; }
    header { margin-bottom: 10px; }
    .game-title { font-size: clamp(1.5rem, 7vw, 2.5rem) !important; }
    .modal { padding: 28px 22px; }
    .modal h2 { font-size: 1.5rem; }
    .modal .trophy { font-size: 2.8rem; }
    .modal .dev-credit { font-size: 0.85rem; }
    .modal-btns button { padding: 10px 20px; font-size: 1rem; }
  }

  @media (max-width: 380px) {
    .board { gap: 4px; padding: 8px; }
    .game-layout { gap: 10px; }
  }

  /* Touch improvements */
  .cell { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .grid-btn { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="confetti-wrap" id="confettiWrap"></div>

<div class="wrapper">
  <header>
    <div class="game-title">
      <span class="title-zak">Zak</span>
      <span class="title-amp">&amp;</span>
      <span class="title-zayd">Zayd</span>
    </div>
    <div class="game-title" style="font-size:clamp(1.2rem,3.5vw,2rem);">
      <span style="color:var(--gold);font-family:'Boogaloo',cursive;letter-spacing:3px;">TIC-TAC-TOE</span>
    </div>
    <div class="title-sub">The Ultimate Challenge</div>
  </header>

  <!-- ── SETUP SCREEN ── -->
  <div class="screen active" id="setupScreen">
    <div class="setup-card">
      <h2>🎮 Game Setup</h2>

      <div class="input-group">
        <label class="x-label">✕ Player 1 Name</label>
        <input type="text" id="nameX" placeholder="Enter name..." maxlength="16">
      </div>
      <div class="input-group">
        <label class="o-label">○ Player 2 Name</label>
        <input type="text" id="nameO" placeholder="Enter name..." maxlength="16">
      </div>

      <div class="grid-picker">
        <label>🔲 Choose Grid Size</label>
        <div class="grid-options">
          <button class="grid-btn selected" data-size="3">3×3 (9 cells)</button>
          <button class="grid-btn" data-size="4">4×4 (16 cells)</button>
          <button class="grid-btn" data-size="5">5×5 (25 cells)</button>
          <button class="grid-btn" data-size="6">6×6 (36 cells)</button>
        </div>
      </div>

      <button class="start-btn" id="startBtn">🚀 START GAME</button>
    </div>
  </div>

  <!-- ── GAME SCREEN ── -->
  <div class="screen" id="gameScreen">
    <div class="status-bar" id="statusBar">Player X's turn</div>
    <div class="game-layout">
      <div class="score-panel">
        <h3>🏆 Scoreboard</h3>
        <div class="score-row x-row active-turn" id="scoreRowX">
          <span class="score-name" id="scoreNameX">Player X</span>
          <span class="score-num" id="scoreNumX">0</span>
        </div>
        <div class="score-row o-row" id="scoreRowO">
          <span class="score-name" id="scoreNameO">Player O</span>
          <span class="score-num" id="scoreNumO">0</span>
        </div>
        <div class="draw-row">Draws: <span class="draw-num" id="drawNum">0</span></div>
        <button class="music-toggle" id="musicToggle">🎵 Music: ON</button>
      </div>

      <div class="board-wrap">
        <div class="board" id="board"></div>
        <div class="board-actions">
          <button class="action-btn" id="newRoundBtn">🔄 New Round</button>
          <button class="action-btn danger" id="backMenuBtn">🏠 Main Menu</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── WIN / DRAW MODAL ── -->
<div class="overlay" id="resultOverlay">
  <div class="modal">
    <div class="trophy" id="modalTrophy">🏆</div>
    <h2 id="modalTitle">Winner!</h2>
    <p class="win-msg" id="modalMsg"></p>
    <div class="dev-credit">
      🎉 Congratulations!! You just finished playing<br>
      <strong>Zak &amp; Zayd's Tic-Tac-Toe</strong><br>
      — Developed by Zakariya A.
    </div>
    <div class="modal-btns">
      <button class="btn-play" id="modalPlayAgain">▶ Play Again</button>
      <button class="btn-menu" id="modalMenu">🏠 Menu</button>
    </div>
  </div>
</div>

<footer>Zak &amp; Zayd Tic-Tac-Toe &nbsp;·&nbsp; Developed by Zakariya A.</footer>

<script>
// ── Stars ──────────────────────────────────────────────────────────────────
(function createStars(){
  for(let i=0;i<70;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${Math.random()*0.6+0.1}`;
    document.body.appendChild(s);
  }
})();

// ── Audio Engine ─────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type='sine', dur=0.18, vol=0.25, delay=0){
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.setValueAtTime(freq, AC.currentTime+delay);
  g.gain.setValueAtTime(vol, AC.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);
  o.stop(AC.currentTime+delay+dur+0.01);
}

function sfxX(){
  // Bold punchy sound – two quick tones
  playTone(300,'sawtooth',0.12,0.18);
  playTone(180,'square',0.15,0.14,0.08);
}

function sfxO(){
  // Smooth bubbly sound
  playTone(520,'sine',0.15,0.2);
  playTone(660,'sine',0.12,0.15,0.08);
}

function sfxWin(){
  [0,0.08,0.16,0.26,0.38].forEach((d,i)=>{
    playTone([523,659,784,1047,1319][i],'sine',0.25,0.2,d);
  });
}

function sfxDraw(){
  [0,0.1,0.2].forEach((d,i)=>{
    playTone([400,350,300][i],'triangle',0.2,0.18,d);
  });
}

// ── Background Music ─────────────────────────────────────────────────────────
let musicOn = true;
let musicIntervalId = null;
const melody = [261,294,330,349,392,440,494,523,494,440,392,349,330,294,261,0];
let melodyIdx = 0;

function playMelodyNote(){
  if(!musicOn) return;
  const f = melody[melodyIdx % melody.length];
  if(f>0) playTone(f,'sine',0.35,0.06);
  melodyIdx++;
}

function startMusic(){
  if(musicIntervalId) return;
  musicIntervalId = setInterval(playMelodyNote, 420);
}

function stopMusic(){
  clearInterval(musicIntervalId);
  musicIntervalId = null;
}

document.getElementById('musicToggle').addEventListener('click', ()=>{
  musicOn = !musicOn;
  document.getElementById('musicToggle').textContent = musicOn ? '🎵 Music: ON' : '🔇 Music: OFF';
  if(musicOn) startMusic(); else stopMusic();
  AC.resume();
});

// ── Game State ────────────────────────────────────────────────────────────────
let gridSize = 3;
let board = [];
let currentPlayer = 'X';
let gameOver = false;
let scores = {X:0, O:0, draw:0};
let nameX = 'Player X', nameO = 'Player O';

// ── Grid Size Picker ──────────────────────────────────────────────────────────
document.querySelectorAll('.grid-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.grid-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    gridSize = parseInt(btn.dataset.size);
  });
});

// ── Start Game ────────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', ()=>{
  AC.resume();
  nameX = document.getElementById('nameX').value.trim() || 'Player X';
  nameO = document.getElementById('nameO').value.trim() || 'Player O';
  document.getElementById('scoreNameX').textContent = nameX;
  document.getElementById('scoreNameO').textContent = nameO;
  scores = {X:0, O:0, draw:0};
  updateScoreDisplay();
  showScreen('gameScreen');
  initGame();
  startMusic();
});

// ── Show Screen ───────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Init Game ─────────────────────────────────────────────────────────────────
function initGame(){
  const N = gridSize;
  board = Array(N*N).fill(null);
  currentPlayer = 'X';
  gameOver = false;
  renderBoard();
  updateStatus();
  updateActiveRow();
}

// ── Render Board ──────────────────────────────────────────────────────────────
function renderBoard(){
  const N = gridSize;
  const boardEl = document.getElementById('board');
  // Cell size based on grid
  const maxW = Math.min(window.innerWidth - 280, 560);
  const cellSz = Math.max(40, Math.floor((maxW - N*8 - 32) / N));
  boardEl.style.gridTemplateColumns = `repeat(${N}, ${cellSz}px)`;
  boardEl.style.gridTemplateRows    = `repeat(${N}, ${cellSz}px)`;
  boardEl.innerHTML = '';
  board.forEach((val, i)=>{
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.fontSize = `${Math.max(14, cellSz * 0.55)}px`;
    if(val){
      cell.innerHTML = `<span class="mark">${val==='X'?'✕':'○'}</span>`;
      cell.classList.add('taken', val==='X'?'x-cell':'o-cell');
    }
    cell.addEventListener('click', ()=>handleClick(i));
    boardEl.appendChild(cell);
  });
}

// ── Handle Click ──────────────────────────────────────────────────────────────
function handleClick(i){
  if(board[i] || gameOver) return;
  AC.resume();
  board[i] = currentPlayer;
  currentPlayer==='X' ? sfxX() : sfxO();
  renderBoard();
  const result = checkWinner();
  if(result){
    gameOver = true;
    if(result.winner){
      markWinners(result.line);
      scores[result.winner]++;
      updateScoreDisplay();
      sfxWin();
      launchConfetti(result.winner);
      setTimeout(()=>showResult(result.winner), 700);
    } else {
      scores.draw++;
      updateScoreDisplay();
      sfxDraw();
      setTimeout(()=>showResult(null), 400);
    }
  } else {
    currentPlayer = currentPlayer==='X'?'O':'X';
    updateStatus();
    updateActiveRow();
  }
}

// ── Check Winner ─────────────────────────────────────────────────────────────
function checkWinner(){
  const N = gridSize;
  const winLen = N >= 5 ? 4 : N; // 4-in-a-row for 5×5 or 6×6
  // Rows
  for(let r=0;r<N;r++) for(let c=0;c<=N-winLen;c++){
    const line=[];
    for(let k=0;k<winLen;k++) line.push(r*N+c+k);
    if(allSame(line)) return {winner:board[line[0]],line};
  }
  // Cols
  for(let c=0;c<N;c++) for(let r=0;r<=N-winLen;r++){
    const line=[];
    for(let k=0;k<winLen;k++) line.push((r+k)*N+c);
    if(allSame(line)) return {winner:board[line[0]],line};
  }
  // Diag ↘
  for(let r=0;r<=N-winLen;r++) for(let c=0;c<=N-winLen;c++){
    const line=[];
    for(let k=0;k<winLen;k++) line.push((r+k)*N+(c+k));
    if(allSame(line)) return {winner:board[line[0]],line};
  }
  // Diag ↙
  for(let r=0;r<=N-winLen;r++) for(let c=winLen-1;c<N;c++){
    const line=[];
    for(let k=0;k<winLen;k++) line.push((r+k)*N+(c-k));
    if(allSame(line)) return {winner:board[line[0]],line};
  }
  if(board.every(c=>c)) return {winner:null,line:[]};
  return null;
}

function allSame(line){
  const v=board[line[0]];
  return v && line.every(i=>board[i]===v);
}

// ── Mark winners ─────────────────────────────────────────────────────────────
function markWinners(line){
  const cells = document.querySelectorAll('.cell');
  line.forEach(i=>cells[i].classList.add('winner-cell'));
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function updateStatus(){
  const name = currentPlayer==='X' ? nameX : nameO;
  const sym  = currentPlayer==='X' ? '✕' : '○';
  document.getElementById('statusBar').textContent = `${name}'s turn  ${sym}`;
  document.getElementById('statusBar').style.color = currentPlayer==='X' ? 'var(--x-color)' : 'var(--o-color)';
}

function updateActiveRow(){
  document.getElementById('scoreRowX').classList.toggle('active-turn', currentPlayer==='X');
  document.getElementById('scoreRowO').classList.toggle('active-turn', currentPlayer==='O');
}

function updateScoreDisplay(){
  document.getElementById('scoreNumX').textContent = scores.X;
  document.getElementById('scoreNumO').textContent = scores.O;
  document.getElementById('drawNum').textContent   = scores.draw;
}

// ── Result Modal ─────────────────────────────────────────────────────────────
function showResult(winner){
  const overlay = document.getElementById('resultOverlay');
  const title   = document.getElementById('modalTitle');
  const msg     = document.getElementById('modalMsg');
  const trophy  = document.getElementById('modalTrophy');
  if(winner){
    const wName = winner==='X' ? nameX : nameO;
    const wColor = winner==='X' ? '#e63946' : '#1d7fe8';
    trophy.textContent = '🏆';
    title.textContent = `${wName} Wins!`;
    title.style.color = wColor;
    msg.textContent = `Amazing! ${wName} got ${gridSize>=5?4:gridSize} in a row!`;
  } else {
    trophy.textContent = '🤝';
    title.textContent = "It's a Draw!";
    title.style.color = 'var(--gold)';
    msg.textContent = "Great game! No one wins this round.";
  }
  overlay.classList.add('show');
}

document.getElementById('modalPlayAgain').addEventListener('click', ()=>{
  document.getElementById('resultOverlay').classList.remove('show');
  initGame();
});
document.getElementById('modalMenu').addEventListener('click', ()=>{
  document.getElementById('resultOverlay').classList.remove('show');
  stopMusic();
  showScreen('setupScreen');
});

// ── Buttons ───────────────────────────────────────────────────────────────────
document.getElementById('newRoundBtn').addEventListener('click', ()=>{ AC.resume(); initGame(); });
document.getElementById('backMenuBtn').addEventListener('click', ()=>{ stopMusic(); showScreen('setupScreen'); });

// ── Confetti ──────────────────────────────────────────────────────────────────
function launchConfetti(winner){
  const colors = winner==='X'
    ? ['#e63946','#ff6b9d','#ff9f1c','#ffdd00']
    : ['#1d7fe8','#4ecdc4','#a8dadc','#90e0ef'];
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML='';
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='cf';
    const w=Math.random()*12+5, h=Math.random()*8+4;
    const rot=`${Math.floor(Math.random()*720-360)}deg`;
    p.style.cssText=`left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.4?'50%':'2px'};--d:${(Math.random()*2+1.2).toFixed(1)}s;--delay:${(Math.random()*0.6).toFixed(2)}s;--rot:${rot}`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.innerHTML='', 4000);
}
</script>
</body>
</html>
